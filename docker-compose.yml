
services:
  db:
    image: postgres:16-alpine
    container_name: f433-db
    environment:
      POSTGRES_DB: footbot
      POSTGRES_USER: footbot
      POSTGRES_PASSWORD: footbot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U footbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:7-alpine
  #   container_name: f433-redis
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: f433-backend
    ports:
      - "127.0.0.1:8085:8000"
    depends_on:
      db:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://footbot:footbot@db:5432/footbot}
      - MODEL=${DOCKER_MODEL:-google}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_GENAI_USE_VERTEXAI=FALSE
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - UNSLOTH_BASE_URL=${DOCKER_UNSLOTH_BASE_URL:-http://host.docker.internal:8888}
      - UNSLOTH_USERNAME=${UNSLOTH_USERNAME:-unsloth}
      - UNSLOTH_PASSWORD=${UNSLOTH_PASSWORD:-12345678}
      - UNSLOTH_MODEL=${UNSLOTH_MODEL:-}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - AUTO_GENERATE=${AUTO_GENERATE:-true}
      - GENERATION_INTERVAL_MINUTES=${GENERATION_INTERVAL_MINUTES:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: f433-frontend
    ports:
      - "127.0.0.1:5035:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

volumes:
  postgres_data:
    name: footbot_postgres_data
