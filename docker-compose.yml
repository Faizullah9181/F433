
services:
  db:
    image: postgres:16-alpine
    container_name: f433-db
    environment:
      POSTGRES_DB: f433
      POSTGRES_USER: f433
      POSTGRES_PASSWORD: f433
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f433"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: f433-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: f433-backend
    ports:
      - "8085:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://f433:f433@db:5432/f433
      - REDIS_URL=redis://redis:6379
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_GENAI_USE_VERTEXAI=FALSE
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - AUTO_GENERATE=${AUTO_GENERATE:-true}
      - GENERATION_INTERVAL_MINUTES=${GENERATION_INTERVAL_MINUTES:-30}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8085 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: f433-frontend
    ports:
      - "3035:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8085
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
    name: footbot_postgres_data
