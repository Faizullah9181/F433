#cloud-config

hostname: ${hostname}
manage_etc_hosts: true

package_update: true
package_upgrade: true

packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - ufw
  - htop
  - curl
  - wget
  - git
  - ca-certificates
  - gnupg
  - lsb-release

write_files:
  # Nginx site config for api (before SSL — certbot will add SSL blocks)
  - path: /etc/nginx/sites-available/api
    content: |
      # Rate limiting zones
      limit_req_zone $$binary_remote_addr zone=api_general:10m rate=10r/s;
      limit_req_zone $$binary_remote_addr zone=api_burst:10m rate=30r/s;

      server {
          listen 80;
          server_name ${domain};

          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

          # Hide Nginx version
          server_tokens off;

          # Limit request body size (default 1m, explicit for clarity)
          client_max_body_size 1m;

          # Block Swagger UI, ReDoc, and OpenAPI schema in production
          location = /docs { return 404; }
          location = /redoc { return 404; }
          location = /openapi.json { return 404; }

          # Rate limit all API requests: 10 req/s with burst of 20
          location / {
              limit_req zone=api_general burst=20 nodelay;
              limit_req_status 429;

              proxy_pass http://127.0.0.1:8085;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_set_header Connection "";

              proxy_read_timeout 120s;
              proxy_connect_timeout 10s;
              proxy_send_timeout 60s;
          }

          # Stricter rate limit on generate/activate endpoints
          location ~ ^/(generate|agents/.*/activate) {
              limit_req zone=api_burst burst=5 nodelay;
              limit_req_status 429;

              proxy_pass http://127.0.0.1:8085;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              proxy_read_timeout 120s;
              proxy_connect_timeout 10s;
              proxy_send_timeout 60s;
          }

          # Health check — no rate limit
          location = /health {
              proxy_pass http://127.0.0.1:8085;
              proxy_set_header Host $$host;
          }
      }

  # Application .env file
  - path: /root/F433/.env
    permissions: "0600"
    content: |
      GEMINI_MODEL=${gemini_model}
      GOOGLE_API_KEY=${google_api_key}
      API_FOOTBALL_HOST=v3.football.api-sports.io
      API_FOOTBALL_KEY=${api_football_key}
      REDIS_URL=redis://redis:6379
      VITE_API_URL=http://localhost:8000
      MODEL=${llm_backend}
      UNSLOTH_BASE_URL=http://host.docker.internal:8888
      UNSLOTH_USERNAME=unsloth
      UNSLOTH_PASSWORD=12345678
      UNSLOTH_MODEL=
      CORS_ORIGINS=${cors_origins}

runcmd:
  # ── Docker CE (official repo) ──
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # ── Enable Docker ──
  - systemctl enable docker
  - systemctl start docker

  # ── UFW Firewall ──
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw allow 'Nginx Full'
  - ufw --force enable

  # ── Clone project ──
  - git clone https://github.com/${github_repo}.git /root/F433 || true

  # ── Nginx setup ──
  - ln -sf /etc/nginx/sites-available/api /etc/nginx/sites-enabled/api
  - nginx -t && systemctl reload nginx

  # ── SSL certificate (certbot) ──
  - certbot --nginx -d ${domain} --non-interactive --agree-tos -m ${certbot_email} --redirect

  # ── Start application ──
  - cd /root/F433 && docker compose up -d --build

  # ── Signal cloud-init finished ──
  - echo "cloud-init provisioning complete" > /var/log/f433-provisioned
